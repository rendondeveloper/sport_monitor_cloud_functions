version: "1.0"
project: sport_monitor_cloud_functions
platform: python_firebase
python_version: "3.12"
runtime: firebase_functions_2nd_gen

context:
  - path: ai-system/context/architecture.md
    description: "Firebase Functions pattern, template obligatorio, regiones, flujos de competidores"
  - path: ai-system/context/coding-standards.md
    description: "Early return, naming, FirestoreCollections, FirestoreHelper, logging, CORS"
  - path: ai-system/context/project-structure.md
    description: "Estructura functions/, módulos existentes, cómo registrar en main.py"
  - path: ai-system/context/workflow.md
    description: "SDD fases, waves, phase decision table, hard rules"

agents:
  - name: architect
    model: opus
    path: ai-system/agents/architect.md
    description: "Coordinador — planifica y delega, nunca implementa código"
  - name: functions-cross
    model: haiku
    path: ai-system/agents/functions-cross.md
    description: "Registro en main.py, FirestoreCollections, modelos, utils compartidos"
  - name: functions-endpoint
    model: haiku
    path: ai-system/agents/functions-endpoint.md
    description: "Implementación de endpoints con template obligatorio y FirestoreHelper"
  - name: functions-test
    model: sonnet
    path: ai-system/agents/functions-test.md
    description: "pytest tests — AAA pattern, mocks, cobertura >= 90%"
  - name: functions-docs
    model: opus
    path: ai-system/agents/functions-docs.md
    description: "README por módulo — endpoints, params, curl examples, errores"

skills:
  - name: plan
    path: ai-system/skills/plan/SKILL.md
    description: "Analiza request, lista endpoints/colecciones/helpers afectados, produce plan"
  - name: sdd_explore
    path: ai-system/skills/sdd_explore/SKILL.md
    description: "Exploración de módulo existente — output: ai-system/changes/<module>/explore.md"
  - name: sdd_design
    path: ai-system/skills/sdd_design/SKILL.md
    description: "Diseño de contratos HTTP y Firestore paths — output: design.md"
  - name: sdd_verify
    path: ai-system/skills/sdd_verify/SKILL.md
    description: "Checklist post-implementación pre-deploy — valida template, CORS, tests, docs"
  - name: new-function
    path: ai-system/skills/new-function/SKILL.md
    description: "Crea endpoint HTTP completo con template obligatorio y lo registra en main.py"
  - name: add-model
    path: ai-system/skills/add-model/SKILL.md
    description: "Añade modelo Firestore en models/ con from_dict y to_dict"
  - name: add-util
    path: ai-system/skills/add-util/SKILL.md
    description: "Añade helper puro en utils/ — documentado, sin side effects"
  - name: add-firestore-query
    path: ai-system/skills/add-firestore-query/SKILL.md
    description: "Añade query Firestore usando FirestoreHelper (no firestore.client() directo)"
  - name: add-test
    path: ai-system/skills/add-test/SKILL.md
    description: "Añade pytest tests — AAA, fixtures, mocks, casos obligatorios"
  - name: qa-ready
    path: ai-system/skills/qa-ready/SKILL.md
    description: "Documento QA pre-deploy — endpoints, curl, casos, errores esperados"
  - name: push
    path: ai-system/skills/push/SKILL.md
    description: "Commit + push con Conventional Commits — feat/fix/refactor/test/docs"
  - name: update-readme
    path: ai-system/skills/update-readme/SKILL.md
    description: "Crea o actualiza README de módulo con tabla de endpoints y ejemplos"
  - name: skill_registry
    path: ai-system/skills/skill_registry/SKILL.md
    description: "Regenera skill-registry.md con estado actual de todos los skills"

execution_order:
  wave_1:
    parallel: true
    agents: [functions-cross, functions-endpoint]
    description: "Registro en main.py, colecciones, modelos e implementación del endpoint"
  wave_2:
    parallel: false
    agents: [functions-test]
    description: "Tests unitarios — requiere que wave_1 esté completo"
  wave_3:
    parallel: false
    agents: [functions-docs]
    description: "README del módulo — SIEMPRE obligatorio, nunca omitir"

regions:
  primary: "us-east4"        # competitors, catalogs, tracking
  secondary: "us-central1"   # general, monitor, staff

deploy:
  single: "firebase deploy --only functions:{function_name}"
  all: "firebase deploy --only functions"
  test: "pytest functions/tests/ -v --cov=functions --cov-fail-under=90"
